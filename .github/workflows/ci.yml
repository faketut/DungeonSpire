name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
      - name: Build game
        working-directory: src
        run: make CXX=${{ matrix.compiler }}
      - name: Build tests
        working-directory: tests
        run: make CXX=${{ matrix.compiler }}
      - name: Run tests
        working-directory: tests
        run: ./run_tests
      - name: Smoke run (valgrind, g++ only)
        if: matrix.compiler == 'g++'
        working-directory: src
        run: |
          printf "h\nq\n" | valgrind --error-exitcode=1 --leak-check=full ./cc3k
